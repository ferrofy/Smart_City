<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Dashboard</title>
    <link rel="stylesheet" href="Files/CSS/Style.css">
    <script>
        setInterval(function() {
            location.reload();
        }, 3000);
    </script>
</head>
<body>

    <h1>🏙️ Smart City Real-Time Dashboard</h1>

        <p>{{ sensor_data.waste_distance }} cm</p>
    </div>

</html>
